<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sophie character silhouette from Howl's Moving Castle -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Dress -->
  <path d="M 24 28 L 20 45 L 44 45 L 40 28 Z" fill="#3d5a5a" filter="url(#shadow)"/>
  
  <!-- Head -->
  <circle cx="32" cy="16" r="12" fill="#3d5a5a"/>
  
  <!-- Hair bun -->
  <circle cx="32" cy="10" r="8" fill="#3d5a5a"/>
  
  <!-- Face -->
  <circle cx="28" cy="15" r="2" fill="white"/>
  <circle cx="36" cy="15" r="2" fill="white"/>
  
  <!-- Eyes pupils -->
  <circle cx="28.5" cy="15" r="1" fill="#5a4a42"/>
  <circle cx="36.5" cy="15" r="1" fill="#5a4a42"/>
  
  <!-- Mouth (small smile) -->
  <path d="M 30 20 Q 32 22 34 20" stroke="#3d5a5a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Arms -->
  <rect x="18" y="30" width="4" height="12" fill="#3d5a5a" rx="2"/>
  <rect x="42" y="30" width="4" height="12" fill="#3d5a5a" rx="2"/>
</svg>
