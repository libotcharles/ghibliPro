<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Totoro silhouette -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Body -->
  <ellipse cx="32" cy="38" rx="22" ry="18" fill="#2c3e50" filter="url(#shadow)"/>
  
  <!-- Head -->
  <circle cx="32" cy="20" r="16" fill="#2c3e50"/>
  
  <!-- Left ear -->
  <ellipse cx="18" cy="8" rx="6" ry="10" fill="#2c3e50"/>
  
  <!-- Right ear -->
  <ellipse cx="46" cy="8" rx="6" ry="10" fill="#2c3e50"/>
  
  <!-- Eyes -->
  <circle cx="26" cy="18" r="3" fill="white"/>
  <circle cx="38" cy="18" r="3" fill="white"/>
  
  <!-- Left eye pupil -->
  <circle cx="27" cy="18" r="1.5" fill="#2c3e50"/>
  
  <!-- Right eye pupil -->
  <circle cx="39" cy="18" r="1.5" fill="#2c3e50"/>
  
  <!-- Smile -->
  <path d="M 28 24 Q 32 27 36 24" stroke="#2c3e50" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
