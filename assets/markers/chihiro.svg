<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Chihiro in traditional spirit world dress -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Dress (white) -->
  <path d="M 22 32 L 18 52 L 46 52 L 42 32 Z" fill="#e8d9b8" filter="url(#shadow)"/>
  
  <!-- Head -->
  <circle cx="32" cy="16" r="11" fill="#c9a876"/>
  
  <!-- Hair -->
  <path d="M 20 16 Q 32 8 44 16" fill="#4a3728"/>
  
  <!-- Face details -->
  <circle cx="28" cy="14" r="2" fill="#1a1a1a"/>
  <circle cx="36" cy="14" r="2" fill="#1a1a1a"/>
  
  <!-- Mouth (surprised expression) -->
  <path d="M 30 19 Q 32 21 34 19" stroke="#c9a876" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Sleeves accent -->
  <rect x="18" y="34" width="3" height="14" fill="#c9a876" rx="1.5"/>
  <rect x="43" y="34" width="3" height="14" fill="#c9a876" rx="1.5"/>
  
  <!-- Hair ornament (red ribbon) -->
  <circle cx="32" cy="10" r="3" fill="#d4764a"/>
</svg>
