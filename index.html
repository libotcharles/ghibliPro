<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghibli World Atlas</title>

    <!-- Leaflet -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- MarkerCluster -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />

    <!-- Animazioni -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <!-- Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/map.css">
    <link rel="stylesheet" href="style/atlas.css">
    <link rel="stylesheet" href="style/sidebar.css">
</head>

<body>
    <!-- 🌿 LANDING -->
    <section id="landing-page" class="animate__animated">
        <div class="landing-content animate__animated animate__fadeIn">
            <h1>Ghibli World Atlas</h1>
            <p>Un viaggio tra i luoghi reali della magia</p>

            <button id="start-btn" class="btn-figo">
                Inizia a esplorare
            </button>
        </div>
    </section>

    <!-- 🌍 ATLAS -->
    <section id="atlas-page" class="hidden">
        <!-- 🗺️ MAPPA -->
        <div id="atlas-map"></div>

        <!-- 🔍 SEARCH -->
        <div class="atlas-search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Cerca film o regista...">
        </div>

        <!-- 🎛️ MAP TOOLS -->
        <div class="map-tools">
            <button id="fit-all-btn" class="map-tool-btn" title="Mostra tutti i luoghi">
                <i class="fas fa-expand"></i>
            </button>

            <button id="toggle-style-btn" class="map-tool-btn" title="Cambia stile mappa">
                <i class="fas fa-layer-group"></i>
            </button>

            <button id="compass-btn" class="map-tool-btn compass-btn" title="Viaggio casuale">
                🧭
            </button>
        </div>

        <!-- 📂 PANEL DETTAGLIO -->
        <div class="atlas-detail-panel" id="detail-panel">
            <button id="close-panel" class="close-panel">×</button>

            <div id="panel-hero-img" class="panel-hero-img"></div>

            <div class="panel-content">
                <h2 id="panel-title">Titolo</h2>

                <p><strong>📅</strong> <span id="panel-year"></span></p>
                <p><strong>🎬</strong> <span id="panel-director"></span></p>
                <p><strong>📍</strong> <span id="panel-location"></span></p>

                <hr>

                <h3>✨ Ispirazione</h3>
                <p id="panel-inspiration"></p>

                <hr>

                <h3>⭐ MC</h3>
                <p id="panel-rating"></p>
            </div>
        </div>
    </section>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- MarkerCluster -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- JS -->
    <script src="js/map-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
