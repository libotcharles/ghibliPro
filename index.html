<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghibli World Atlas</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- MarkerCluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- Animazioni -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/map.css">
    <link rel="stylesheet" href="style/atlas.css">
    <link rel="stylesheet" href="style/sidebar.css">
</head>

<body>
    <!-- 🌿 LANDING -->
    <section id="landing-page" class="animate__animated">
        <div class="landing-content animate__animated animate__fadeIn">
            <h1>Ghibli World Atlas</h1>
            <p>Un viaggio tra i luoghi reali della magia</p>

            <button id="start-btn" class="btn-figo">
                Inizia a esplorare
            </button>
        </div>
    </section>

    <!-- 🌍 ATLAS -->
    <section id="atlas-page" class="hidden">
        <!-- 🗺️ MAPPA -->
        <div id="atlas-map"></div>

        <!-- 🌬️ TITOLO MAPPA -->
        <div class="atlas-map-title">
            <span>WELCOME TO THE</span>
            <h1>GHIBLI WORLD</h1>
        </div>

        <!-- 🔍 SEARCH -->
        <div class="atlas-search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Cerca film o regista...">
        </div>

        <!-- 🎛️ MAP TOOLS -->
        <div class="map-tools">
            <button id="compass-btn" class="map-tool-btn compass-btn" title="Viaggio casuale">
                🧭
            </button>
        </div>

        <!-- 📂 PANEL DETTAGLIO -->
        <div class="atlas-detail-panel" id="detail-panel">
            <button id="close-panel" class="close-panel">×</button>

            <div id="panel-hero-img" class="panel-hero-img"></div>

            <div class="panel-content">
                <h2 id="panel-title">Titolo</h2>
                <p><strong>📅</strong> <span id="panel-year"></span></p>
                <p><strong>🎬</strong> <span id="panel-director"></span></p>
                <p><strong>📍</strong> <span id="panel-location"></span></p>

                <hr>

                <h3>✨ Ispirazione</h3>
                <p id="panel-inspiration"></p>

                <hr>

                <h3>⭐ MC</h3>
                <p id="panel-rating"></p>
            </div>
        </div>

        <!-- 🎬 OVERLAY FILM -->
        <div id="film-overlay" class="film-overlay hidden">
            <div class="film-overlay-backdrop"></div>

            <button id="film-overlay-close" class="film-overlay-close">×</button>

            <div class="film-overlay-layout">
                <div class="film-side-card film-left-card" id="open-info-page">
                    <div class="info-card-label">
                        <i class="fas fa-leaf"></i>
                        <span>INFO</span>
                    </div>
                    <div id="overlay-left-img" class="overlay-img-box"></div>
                </div>

                <div class="film-center-area">
                    <div id="overlay-main-img" class="film-main-card"></div>

                    <div class="film-title-area">
                        <h1 id="overlay-title">Titolo del film</h1>
                    </div>
                </div>

                <div class="film-side-card film-right-card">
                    <div id="overlay-right-img" class="overlay-img-box"></div>
                </div>
            </div>

            <!-- 📖 INFO PAGE -->
            <div id="film-info-page" class="film-info-page hidden">
                <div class="film-info-book">
                    <button id="film-info-close" class="film-info-close">×</button>

                    <div class="book-left-decoration">
                        <span>INFO</span>
                    </div>

                    <div class="book-content">
                        <div class="book-header">
                            <p>GHIBLI WORLD ATLAS</p>
                            <h2 id="info-title">Titolo</h2>
                        </div>

                        <div class="book-grid">
                            <div class="book-description">
                                <h3>Trama</h3>
                                <p id="info-description"></p>
                            </div>

                            <div class="book-image">
                                <img id="info-image" src="">
                            </div>

                            <div class="book-details">
                                <div class="book-detail-row">
                                    <span>Regia</span>
                                    <strong id="info-director"></strong>
                                </div>

                                <div class="book-detail-row">
                                    <span>Produttore</span>
                                    <strong id="info-producer"></strong>
                                </div>

                                <div class="book-detail-row">
                                    <span>Anno</span>
                                    <strong id="info-release-date"></strong>
                                </div>

                                <div class="book-detail-row">
                                    <span>Durata</span>
                                    <strong id="info-running-time"></strong>
                                </div>

                                <div class="book-detail-row">
                                    <span>RT Score</span>
                                    <strong id="info-rt-score"></strong>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 🖼️ IMAGE PREVIEW -->
            <div id="image-preview-overlay" class="image-preview-overlay hidden">
                <div class="image-preview-box">
                    <img id="preview-img" src="">
                </div>
            </div>
        </div>
    </section>

    <!-- JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script src="js/map-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
